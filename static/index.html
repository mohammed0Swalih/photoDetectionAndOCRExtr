<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoExtr</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #ffffff;
            display: flex;
            height: 100vh;
        }


        /* Main content */
        .main {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #8b8fa8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Upload area */
        .upload-area {
            border: 2px dashed #2a2d3e;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: #4f8ef7;
            background: #1a1d27;
        }

        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-text { color: #8b8fa8; font-size: 14px; }
        .upload-text span { color: #4f8ef7; cursor: pointer; }

        #fileInput { display: none; }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4f8ef7;
            color: white;
        }

        .btn-primary:hover { background: #3a7de8; }

        .btn-secondary {
            background: #2a2d3e;
            color: #8b8fa8;
        }

        .btn-secondary:hover { background: #3a3d4e; color: white; }

        /* Results */
        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: #1a1d27;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2d3e;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8b8fa8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .portrait-img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2d3e;
            font-size: 14px;
        }

        .field-row:last-child { border-bottom: none; }
        .field-label { color: #8b8fa8; }
        .field-value { color: #ffffff; font-weight: 500; }

        .preview-img {
            width: 100%;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        .loading {
            color: #8b8fa8;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            display: none;
        }

        .empty-state {
            color: #8b8fa8;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Main -->
    <div class="main">
        <div class="page-title">ID Document Extraction</div>
        <div class="page-subtitle">Upload an ID card or passport to extract portrait and fields</div>

        <!-- Upload -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your image here or <span>browse</span></div>
            <div class="upload-text" style="margin-top:8px">Supports JPG, PNG</div>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">
        </div>

        <img id="previewImg" class="preview-img" />

        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-primary" onclick="extractPortrait()">Extract Portrait</button>
            <button class="btn btn-secondary" onclick="extractFields()">Extract Fields</button>
            <button class="btn btn-secondary" onclick="extractMRZ()">Parse MRZ</button>
        </div>

        <!-- Results -->
        <div class="results">
            <div class="card">
                <div class="card-title">Portrait</div>
                <div class="loading" id="portraitLoading">Processing...</div>
                <div class="empty-state" id="portraitEmpty">Upload an image and click Extract Portrait</div>
                <img id="portraitResult" class="portrait-img" style="display:none" />
            </div>

            <div class="card">
                <div class="card-title">Extracted Fields</div>
                <div class="empty-state" id="fieldsEmpty">Upload an image and click Extract Fields</div>
                <div id="fieldsResult"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        function previewImage(event) {
            selectedFile = event.target.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.getElementById('previewImg');
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(selectedFile);
        }

        async function extractPortrait() {
            if (!selectedFile) return alert('Please upload an image first!');
            
            document.getElementById('portraitEmpty').style.display = 'none';
            document.getElementById('portraitLoading').style.display = 'block';
            document.getElementById('portraitResult').style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            const res = await fetch('/extract/portrait', { method: 'POST', body: formData });
            const data = await res.json();

            document.getElementById('portraitLoading').style.display = 'none';

            if (data.portrait_base64) {
                const img = document.getElementById('portraitResult');
                img.src = 'data:image/png;base64,' + data.portrait_base64;
                img.style.display = 'block';
            } else {
                document.getElementById('portraitEmpty').style.display = 'block';
                document.getElementById('portraitEmpty').textContent = 'No face detected!';
            }
        }

        async function extractFields() {
            if (!selectedFile) return alert('Please upload an image first!');

            document.getElementById('fieldsEmpty').style.display = 'none';
            document.getElementById('fieldsResult').innerHTML = '<div class="loading" style="display:block">Processing...</div>';

            const formData = new FormData();
            formData.append('file', selectedFile);

            const res = await fetch('/extract/fields', { method: 'POST', body: formData });
            const data = await res.json();

            let html = '';
            for (const [key, value] of Object.entries(data)) {
                if (key === 'dates' && Array.isArray(value)) {
                    html += `<div class="field-row">
                        <span class="field-label">Dates found</span>
                        <span class="field-value">${value.join(', ') || 'None'}</span>
                    </div>`;
                } else if (key !== 'dates') {
                    html += `<div class="field-row">
                        <span class="field-label">${key}</span>
                        <span class="field-value">${value || 'Not found'}</span>
                    </div>`;
                }
            }
            document.getElementById('fieldsResult').innerHTML = html;
        }

        async function extractMRZ() {
            if (!selectedFile) return alert('Please upload an image first!');

            document.getElementById('fieldsEmpty').style.display = 'none';
            document.getElementById('fieldsResult').innerHTML = '<div class="loading" style="display:block">Processing...</div>';

            const formData = new FormData();
            formData.append('file', selectedFile);

            const res = await fetch('/extract/mrz', { method: 'POST', body: formData });
            const data = await res.json();

            let html = '';
            for (const [key, value] of Object.entries(data)) {
                html += `<div class="field-row">
                    <span class="field-label">${key}</span>
                    <span class="field-value">${value || 'Not found'}</span>
                </div>`;
            }
            document.getElementById('fieldsResult').innerHTML = html;
        }
    </script>

</body>
</html>
